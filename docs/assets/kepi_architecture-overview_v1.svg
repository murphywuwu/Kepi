        <path d="M 372 774 L 396 774" stroke="#34d399" stroke-width="1.6" fill="none" marker-end="url(#arrowhead-emerald)"/>
        <path d="M 696 774 L 720 774" stroke="#34d399" stroke-width="1.6" fill="none" marker-end="url(#arrowhead-emerald)"/>
        <path d="M 1000 774 L 1024 774" stroke="#34d399" stroke-width="1.6" fill="none" marker-end="url(#arrowhead-emerald)"/>
        <path d="M 1274 774 L 1300 774" stroke="#34d399" stroke-width="1.6" fill="none" marker-end="url(#arrowhead-emerald)"/>

