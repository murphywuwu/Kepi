<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-label="客批架构总览图">
  <style><![CDATA[
    text { font-family: "JetBrains Mono", monospace; }
  ]]></style>
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <marker id="arrowhead-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
          </marker>
          <marker id="arrowhead-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
          </marker>
          <filter id="glow">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <rect x="0" y="0" width="1600" height="980" fill="#020617"/>
        <rect x="0" y="0" width="1600" height="980" fill="url(#grid)" opacity="0.8"/>

        <!-- Region boundaries -->
        <rect x="24" y="24" width="1552" height="210" rx="12" fill="rgba(120,53,15,0.10)" stroke="#fbbf24" stroke-width="1.4" stroke-dasharray="8,4"/>
        <text x="44" y="48" fill="#fbbf24" font-size="11" font-weight="700">DEPLOYMENT / DELIVERY</text>

        <rect x="24" y="250" width="1552" height="310" rx="12" fill="rgba(8,51,68,0.06)" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="8,4"/>
        <text x="44" y="274" fill="#22d3ee" font-size="11" font-weight="700">BROWSER RUNTIME / INTERACTION LAYER</text>

        <rect x="24" y="576" width="1552" height="380" rx="12" fill="rgba(6,78,59,0.06)" stroke="#34d399" stroke-width="1.2" stroke-dasharray="8,4"/>
        <text x="44" y="600" fill="#34d399" font-size="11" font-weight="700">DOMAIN ENGINE / DATA / PERSISTENCE / TESTS</text>

        <!-- Deployment block -->
        <rect x="60" y="74" width="280" height="128" rx="6" fill="#0f172a"/>
        <rect x="60" y="74" width="280" height="128" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="200" y="104" fill="white" font-size="12" font-weight="700" text-anchor="middle">Vercel</text>
        <text x="200" y="126" fill="#94a3b8" font-size="9" text-anchor="middle">single-package deployment target</text>
        <text x="200" y="150" fill="#94a3b8" font-size="9" text-anchor="middle">static assets + app routes + serverless AI proxy</text>
        <text x="200" y="174" fill="#94a3b8" font-size="9" text-anchor="middle">Node.js runtime for API route</text>

        <rect x="380" y="74" width="280" height="128" rx="6" fill="#0f172a"/>
        <rect x="380" y="74" width="280" height="128" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="520" y="104" fill="white" font-size="12" font-weight="700" text-anchor="middle">Git + CI</text>
        <text x="520" y="126" fill="#94a3b8" font-size="9" text-anchor="middle">versioned TS configs, PR review, build checks</text>
        <text x="520" y="150" fill="#94a3b8" font-size="9" text-anchor="middle">Vitest + Playwright gate core flows</text>
        <text x="520" y="174" fill="#94a3b8" font-size="9" text-anchor="middle">reproducible releases</text>

        <rect x="700" y="74" width="840" height="128" rx="6" fill="#0f172a"/>
        <rect x="700" y="74" width="840" height="128" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="1120" y="104" fill="white" font-size="12" font-weight="700" text-anchor="middle">External Services</text>
        <text x="1120" y="126" fill="#94a3b8" font-size="9" text-anchor="middle">AI provider · real侨批 sources · Google Fonts (optional)</text>
        <text x="1120" y="150" fill="#94a3b8" font-size="9" text-anchor="middle">AI content is optional and fully degradable</text>
        <text x="1120" y="174" fill="#94a3b8" font-size="9" text-anchor="middle">final endings use local assets + local audio fallback</text>

        <!-- Top arrow flow -->
        <path d="M 340 138 L 380 138" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
        <path d="M 660 138 L 700 138" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>

        <!-- Browser / runtime cluster -->
        <rect x="52" y="296" width="1496" height="238" rx="10" fill="rgba(2,6,23,0.88)" stroke="#22d3ee" stroke-width="1.2"/>
        <text x="72" y="320" fill="#22d3ee" font-size="11" font-weight="700">CLIENT BROWSER APP</text>

        <rect x="76" y="340" width="245" height="150" rx="6" fill="#0f172a"/>
        <rect x="76" y="340" width="245" height="150" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="198" y="368" fill="white" font-size="12" font-weight="700" text-anchor="middle">app/page.tsx</text>
        <text x="198" y="388" fill="#94a3b8" font-size="9" text-anchor="middle">single-page main battlefield</text>
        <text x="198" y="410" fill="#94a3b8" font-size="9" text-anchor="middle">server shell + client gameplay</text>
        <text x="198" y="432" fill="#94a3b8" font-size="9" text-anchor="middle">scene switching: prep / battle / ending</text>
        <text x="198" y="454" fill="#94a3b8" font-size="9" text-anchor="middle">debug page lives beside it</text>

        <rect x="346" y="340" width="240" height="150" rx="6" fill="#0f172a"/>
        <rect x="346" y="340" width="240" height="150" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="466" y="368" fill="white" font-size="12" font-weight="700" text-anchor="middle">React UI</text>
        <text x="466" y="388" fill="#94a3b8" font-size="9" text-anchor="middle">shadcn/ui · tailwind components</text>
        <text x="466" y="410" fill="#94a3b8" font-size="9" text-anchor="middle">shop · panels · dialogs · tabs</text>
        <text x="466" y="432" fill="#94a3b8" font-size="9" text-anchor="middle">settlement screens · settings · debug</text>
        <text x="466" y="454" fill="#94a3b8" font-size="9" text-anchor="middle">reads store, emits user actions</text>

        <rect x="616" y="340" width="260" height="150" rx="6" fill="#0f172a"/>
        <rect x="616" y="340" width="260" height="150" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="746" y="368" fill="white" font-size="12" font-weight="700" text-anchor="middle">Canvas 2D Layers</text>
        <text x="746" y="388" fill="#94a3b8" font-size="9" text-anchor="middle">background / units / effects</text>
        <text x="746" y="410" fill="#94a3b8" font-size="9" text-anchor="middle">board, combat, transitions, ending FX</text>
        <text x="746" y="432" fill="#94a3b8" font-size="9" text-anchor="middle">painted from store snapshots</text>
        <text x="746" y="454" fill="#94a3b8" font-size="9" text-anchor="middle">native Canvas 2D only</text>

        <rect x="906" y="340" width="240" height="150" rx="6" fill="#0f172a"/>
        <rect x="906" y="340" width="240" height="150" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="1026" y="368" fill="white" font-size="12" font-weight="700" text-anchor="middle">Zustand Stores</text>
        <text x="1026" y="388" fill="#94a3b8" font-size="9" text-anchor="middle">gameStore · uiStore</text>
        <text x="1026" y="410" fill="#94a3b8" font-size="9" text-anchor="middle">UI mirror + action dispatch only</text>
        <text x="1026" y="432" fill="#94a3b8" font-size="9" text-anchor="middle">no rule truth, no simulation ownership</text>
        <text x="1026" y="454" fill="#94a3b8" font-size="9" text-anchor="middle">syncs engine snapshot to view state</text>

        <rect x="1176" y="340" width="340" height="150" rx="6" fill="#0f172a"/>
        <rect x="1176" y="340" width="340" height="150" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="1346" y="368" fill="white" font-size="12" font-weight="700" text-anchor="middle">Client Runtime Contracts</text>
        <text x="1346" y="388" fill="#94a3b8" font-size="9" text-anchor="middle">fixed tick + requestAnimationFrame</text>
        <text x="1346" y="410" fill="#94a3b8" font-size="9" text-anchor="middle">scene state machine: prep / battle / ending / debug</text>
        <text x="1346" y="432" fill="#94a3b8" font-size="9" text-anchor="middle">Zod validates payloads &amp; snapshots</text>
        <text x="1346" y="454" fill="#94a3b8" font-size="9" text-anchor="middle">断网可玩 + localStorage fallback</text>

        <!-- Browser arrows -->
        <path d="M 321 415 L 346 415" stroke="#22d3ee" stroke-width="1.6" fill="none" marker-end="url(#arrowhead-cyan)"/>
        <path d="M 586 415 L 616 415" stroke="#22d3ee" stroke-width="1.6" fill="none" marker-end="url(#arrowhead-cyan)"/>
        <path d="M 876 415 L 906 415" stroke="#22d3ee" stroke-width="1.6" fill="none" marker-end="url(#arrowhead-cyan)"/>
        <path d="M 1146 415 L 1176 415" stroke="#22d3ee" stroke-width="1.6" fill="none" marker-end="url(#arrowhead-cyan)"/>

        <!-- Engine / data / persistence cluster -->
        <rect x="52" y="622" width="1496" height="290" rx="10" fill="rgba(2,6,23,0.88)" stroke="#34d399" stroke-width="1.2"/>
        <text x="72" y="646" fill="#34d399" font-size="11" font-weight="700">DOMAIN ENGINE &amp; DATA</text>

        <rect x="72" y="670" width="300" height="208" rx="6" fill="#0f172a"/>
        <rect x="72" y="670" width="300" height="208" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="222" y="698" fill="white" font-size="12" font-weight="700" text-anchor="middle">engine/stateMachine</text>
        <text x="222" y="720" fill="#94a3b8" font-size="9" text-anchor="middle">唯一真相 · 纯函数 reducer + immutable state</text>
        <text x="222" y="744" fill="#94a3b8" font-size="9" text-anchor="middle">prep / battle / ending / settings</text>
        <text x="222" y="768" fill="#94a3b8" font-size="9" text-anchor="middle">GameAction → next GameSnapshot</text>
        <text x="222" y="792" fill="#94a3b8" font-size="9" text-anchor="middle">battle / economy / shop / progression</text>
        <text x="222" y="816" fill="#94a3b8" font-size="9" text-anchor="middle">unit tests center here</text>

        <rect x="396" y="670" width="300" height="208" rx="6" fill="#0f172a"/>
        <rect x="396" y="670" width="300" height="208" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="546" y="698" fill="white" font-size="12" font-weight="700" text-anchor="middle">data/</text>
        <text x="546" y="720" fill="#94a3b8" font-size="9" text-anchor="middle">TS constant modules, no runtime DB</text>
        <text x="546" y="744" fill="#94a3b8" font-size="9" text-anchor="middle">pieces · enemies · stages · letters · balance</text>
        <text x="546" y="768" fill="#94a3b8" font-size="9" text-anchor="middle">static configs versioned in Git</text>
        <text x="546" y="792" fill="#94a3b8" font-size="9" text-anchor="middle">typed by TS, validated by Zod</text>
        <text x="546" y="816" fill="#94a3b8" font-size="9" text-anchor="middle">AI fallback content also lives here</text>

        <rect x="720" y="670" width="280" height="208" rx="6" fill="#0f172a"/>
        <rect x="720" y="670" width="280" height="208" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="860" y="698" fill="white" font-size="12" font-weight="700" text-anchor="middle">lib/ + schemas/</text>
        <text x="860" y="720" fill="#94a3b8" font-size="9" text-anchor="middle">Zod schemas, AI adapter, storage helpers</text>
        <text x="860" y="744" fill="#94a3b8" font-size="9" text-anchor="middle">shared runtime validation and utilities</text>
        <text x="860" y="768" fill="#94a3b8" font-size="9" text-anchor="middle">keeps engine inputs and API outputs aligned</text>
        <text x="860" y="792" fill="#94a3b8" font-size="9" text-anchor="middle">thin adapters, no business rules</text>
        <text x="860" y="816" fill="#94a3b8" font-size="9" text-anchor="middle">storage key constants, prompt builders</text>

        <rect x="1024" y="670" width="250" height="208" rx="6" fill="#0f172a"/>
        <rect x="1024" y="670" width="250" height="208" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="1149" y="698" fill="white" font-size="12" font-weight="700" text-anchor="middle">localStorage</text>
        <text x="1149" y="720" fill="#94a3b8" font-size="9" text-anchor="middle">settings · optional snapshot · debug prefs</text>
        <text x="1149" y="744" fill="#94a3b8" font-size="9" text-anchor="middle">no database, no cloud sync</text>
        <text x="1149" y="768" fill="#94a3b8" font-size="9" text-anchor="middle">small and fast enough for black-hatathon demo</text>
        <text x="1149" y="792" fill="#94a3b8" font-size="9" text-anchor="middle">used only as local persistence layer</text>
        <text x="1149" y="816" fill="#94a3b8" font-size="9" text-anchor="middle">load on start, save on key transitions</text>

        <rect x="1300" y="670" width="228" height="208" rx="6" fill="#0f172a"/>
        <rect x="1300" y="670" width="228" height="208" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="1414" y="698" fill="white" font-size="12" font-weight="700" text-anchor="middle">Tests</text>
        <text x="1414" y="720" fill="#94a3b8" font-size="9" text-anchor="middle">Vitest · Playwright</text>
        <text x="1414" y="744" fill="#94a3b8" font-size="9" text-anchor="middle">engine rules · smoke flows</text>
        <text x="1414" y="768" fill="#94a3b8" font-size="9" text-anchor="middle">battle, economy, progression, storage</text>
        <text x="1414" y="792" fill="#94a3b8" font-size="9" text-anchor="middle">main page, ending page, local restore</text>
        <text x="1414" y="816" fill="#94a3b8" font-size="9" text-anchor="middle">guardrails for future refactors</text>

