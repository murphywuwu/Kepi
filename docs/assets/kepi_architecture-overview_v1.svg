        <path d="M 222 490 L 222 670" stroke="#22d3ee" stroke-width="1.2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowhead-cyan)"/>
        <text x="236" y="586" fill="#22d3ee" font-size="8">actions</text>

        <path d="M 546 878 L 1149 878" stroke="#34d399" stroke-width="1.2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowhead-emerald)"/>
        <text x="810" y="866" fill="#34d399" font-size="8">snapshot persist</text>

        <path d="M 860 670 L 860 558" stroke="#a78bfa" stroke-width="1.2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowhead-violet)"/>
        <text x="874" y="612" fill="#a78bfa" font-size="8">schema + adapters</text>

        <path d="M 1414 670 L 1414 558" stroke="#fb7185" stroke-width="1.2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowhead)"/>
        <text x="1428" y="612" fill="#fb7185" font-size="8">validate flows</text>

        <!-- AI API path -->
        <rect x="980" y="232" width="560" height="42" rx="6" fill="rgba(251,146,60,0.18)" stroke="#fb923c" stroke-width="1.2"/>
        <text x="1260" y="258" fill="#fb923c" font-size="9" text-anchor="middle">app/api/ai/route.ts → AI provider → fallback letter pool</text>
        <path d="M 1260 274 L 1260 340" stroke="#fb923c" stroke-width="1.4" fill="none" stroke-dasharray="5,4" marker-end="url(#arrowhead)"/>

        <!-- Legend -->
        <rect x="72" y="900" width="1450" height="42" rx="6" fill="rgba(15,23,42,0.9)" stroke="#334155" stroke-width="1"/>
        <text x="94" y="926" fill="#94a3b8" font-size="10">Legend:</text>
        <text x="162" y="926" fill="#22d3ee" font-size="10">Frontend</text>
        <text x="246" y="926" fill="#94a3b8" font-size="10">·</text>
        <text x="262" y="926" fill="#34d399" font-size="10">Engine / Tests / CI</text>
        <text x="412" y="926" fill="#94a3b8" font-size="10">·</text>
        <text x="428" y="926" fill="#a78bfa" font-size="10">Data / External</text>
        <text x="548" y="926" fill="#94a3b8" font-size="10">·</text>
        <text x="564" y="926" fill="#fb7185" font-size="10">Persistence / UI state</text>
        <text x="742" y="926" fill="#94a3b8" font-size="10">·</text>
